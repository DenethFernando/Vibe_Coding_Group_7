<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Improved Student Profile Card</title>
    <!-- Import Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            /* Gradient Background */
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .profile-card {
            background-color: white;
            padding: 30px;
            width: 320px;
            text-align: center;
            /* Rounded Corners */
            border-radius: 20px;
            /* Shadow */
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s ease;
        }
        .profile-card:hover {
            transform: translateY(-5px);
        }
        .profile-image {
            width: 120px;
            height: 120px;
            margin: 0 auto 20px;
            overflow: hidden;
            border-radius: 50%; /* Circular Image */
            border: 4px solid #764ba2;
        }
        .profile-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        h1 {
            color: #333;
            margin: 10px 0;
            font-size: 24px;
        }
        p.stream {
            color: #764ba2;
            font-weight: 600;
            margin-bottom: 15px;
            text-transform: uppercase;
            font-size: 14px;
            letter-spacing: 1px;
        }
        p.bio {
            color: #666;
            font-size: 14px;
            line-height: 1.6;
        }
    </style>
</head>
<body>

    <div class="profile-card">
        <div class="profile-image">
            <img src="https://via.placeholder.com/150" alt="Profile Image">
        </div>
        <h1>Deneth Fernando</h1>
        <p class="stream">Software Engineering</p>
        <p class="bio">I am a passionate student learning vibe coding and modern web development technologies to build innovative solutions.</p>
    </div>

</body>
</html>
